@if(loggedInUser()){
<app-nav-toolbar (toggleMenuItemsAction)="toggleMenuItems()"></app-nav-toolbar>

}
<!-- Breadcrumb hier -->
<mat-drawer-container class="drawer-container" hasBackdrop="true">
  <mat-drawer #drawer mode="side" [opened]="opened()" disableClose="true" class="hide-scrollbar">
    <app-navigation-list (navItemClickedAction)="navItemClicked()"
      (hideNavigationAction)="hideNavigation()"></app-navigation-list>
  </mat-drawer>
  <mat-drawer-content>
    <router-outlet />
  </mat-drawer-content>
</mat-drawer-container>
