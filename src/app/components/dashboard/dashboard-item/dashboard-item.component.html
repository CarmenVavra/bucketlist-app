<mat-card class="{{color()}}">
  <mat-card-header>
    <mat-card-title>
      <i class="{{icon()}}"></i>
      {{(title())}}
    </mat-card-title>
    <mat-card-subtitle>
      {{subtitle()}}
    </mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    {{(content())}}
  </mat-card-content>
  <mat-card-footer>
    <mat-card-actions align="end">
      <button mat-flat-button (click)="buttonClick()">Details</button>
    </mat-card-actions>
  </mat-card-footer>
</mat-card>
