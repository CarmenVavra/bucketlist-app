<mat-accordion multi>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title>
        @if(priorityClass()){
        <i class="fa-solid fa-circle {{priorityClass()}}"></i>
        }
        {{ title() }}
      </mat-panel-title>
      <mat-panel-description class="header-right"> {{ headerRightSide() }} </mat-panel-description>
    </mat-expansion-panel-header>
    <div>{{ subtitle() }}</div>
    <p>{{ text() }}</p>
    <mat-action-row>
      <app-blanko-button [class.hide]="!showBlankoBtn()" (blankoAction)="blanko()"></app-blanko-button>
      <app-accept-button [class.hide]="!showAcceptBtn()" (acceptAction)="accept()"></app-accept-button>
      <app-deny-button [class.hide]="!showDenyBtn()" (denyAction)="deny()"></app-deny-button>
      <app-publish-button [published]="published()" [class.hide]="!showPublishBtn()"
        (publishAction)="publish()"></app-publish-button>
      <app-unpublish-button [published]="published()" [class.hide]="!showUnpublishBtn()"
        (unpublishAction)="unpublish()"></app-unpublish-button>
      <app-done-button [class.hide]="!showDoneBtn()" (doneAction)="done()"></app-done-button>
      <app-edit-button [class.hide]="!showEditBtn()" (editAction)="edit()"></app-edit-button>
      <app-delete-button [class.hide]="!showDeleteBtn()" (deleteAction)="delete()"></app-delete-button>
    </mat-action-row>
  </mat-expansion-panel>
</mat-accordion>
