<h2>Unternehmungen</h2>
<div (click)="openCreateActivityItem()"><i class="fa-solid fa-circle-plus fa-2x"></i></div>
@if(activities().length > 0){
<mat-accordion multi>
  @for(activity of activities(); track $index){
  <app-activity-item [activityItem]="activity" (editActivityItemAction)="openEditActivityItem($event)"
    (deleteActivityItemAction)="deleteActivityItem($event)" (takeAwaysAction)="openTakeAways(activity.id!)"
    (doneActivityItemAction)="doneActivityItem($event)"></app-activity-item>
  }
</mat-accordion>
}@else {
<app-message-container [message]="message()"></app-message-container>
}
