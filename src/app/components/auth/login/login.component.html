<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>E-Mail</mat-label>
    <input matInput id="email" formControlName="email">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Passwort</mat-label>
    <input type="password" matInput id="password" formControlName="password">
  </mat-form-field>
  <!-- <button type="submit" mat-raised-button color="primary" class="m-2" style="width: 150px;"
    [disabled]="!loginForm.valid">registrieren</button> -->
  <mat-action-row align="end">
    <button type="submit" mat-raised-button color="primary" class="m-2" style="width: 150px;">login</button>

  </mat-action-row>
</form>
