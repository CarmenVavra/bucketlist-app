<h2>Notizen</h2>
<app-plus-button (openCreateAction)="openCreate()"></app-plus-button>
@if(noteItems().length > 0){
@for(noteItem of noteItems(); track noteItem.id){
<app-note-item [noteItem]="noteItem" (openEditAction)="openEdit($event)"
  (deleteAction)="deleteNoteItem($event)"></app-note-item>
}
}@else {
<p>{{ message() }}</p>
}
